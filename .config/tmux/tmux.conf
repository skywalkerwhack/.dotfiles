# Shell and Terminal

# Start new panes and windows with zsh, and advertise 256-color tmux support
# to applications running inside tmux.
set-option -g default-shell /usr/bin/fish
set -g default-terminal "xterm-256color"



# Keep Alt/Meta key chords responsive by shortening the delay tmux waits after
# an escape character.
set -sg escape-time 10


# Prefix

# Use Alt-a as the tmux prefix instead of the default Ctrl-b. Pressing Alt-a
# twice sends a literal prefix key through to the running application.
unbind C-b
set -g prefix M-a
bind M-a send-prefix


# Status Bar

# Give the status bar a dark background with blue foreground text.
set -g status-style 'bg=#333333 fg=#5eacd3'
# set -g status-position top


# General Bindings

# Reload this config with prefix + r after editing it.
bind r source-file ~/.config/tmux/tmux.conf

# Number windows starting at 1, matching how humans usually count tabs.
set -g base-index 1


# Copy Mode

# Use vi-style navigation and selection in copy mode. Press v to begin a
# selection and y to copy it to the system clipboard with xclip.
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'


# Pane and Window Navigation

# Move around panes with vim-style h/j/k/l keys, and use Ctrl-^ to jump back
# to the last active window.
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R


# Project Helpers

# Open the nearest project TODO file in a new window, falling back to the
# personal TODO file when the current directory does not have one.
bind -r D neww -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/.dotfiles/personal/todo.md"

# Replace tmux's built-in find-window shortcut with the sessionizer script.
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Convenience launchers for frequently used scripts and projects.
bind-key -r i run-shell "tmux neww tmux-cht.sh"
bind-key -r m run-shell "~/.local/bin/tmux-sessionizer ~/coding/mind_bridge"
bind-key -r C run-shell "~/.local/bin/tmux-sessionizer ~/work/tvui"
bind-key -r R run-shell "~/.local/bin/tmux-sessionizer ~/work/milo"
# bind-key -r L run-shell "~/.local/bin/tmux-sessionizer ~/work/hpack"
bind-key -r H run-shell "~/.local/bin/tmux-sessionizer ~/personal/vim-with-me"
bind-key -r T run-shell "~/.local/bin/tmux-sessionizer ~/personal/refactoring.nvim"
bind-key -r N run-shell "~/.local/bin/tmux-sessionizer ~/personal/harpoon"
bind-key -r S run-shell "~/.local/bin/tmux-sessionizer ~/personal/developer-productivity"


# Plugins

# Plugins managed by TPM, the tmux plugin manager.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'lloydbond/tmux-floating-terminal'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
